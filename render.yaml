services:
  - type: web
    name: kcau-kms-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET
        generateValue: true
      - key: DEBUG
        value: 0
      - key: ALLOWED_HOSTS
        value: kcau-kms-backend.onrender.com
      - key: CORS_ALLOW_ALL_ORIGINS
        value: 0
      - key: CORS_ALLOWED_ORIGINS
        value: https://kcau-kms.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://kcau-kms.vercel.app

  - type: static
    name: kcau-kms-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    pullRequestPreviewsEnabled: false
    envVars:
      - key: REACT_APP_API_URL
        value: https://kcau-kms-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
